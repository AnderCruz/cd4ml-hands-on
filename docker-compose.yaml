services:
  welcome:
    image: httpd:2.4-alpine
    container_name: welcome_server
    ports:
      - "3000:80"
    volumes:
      - ./public-html:/usr/local/apache2/htdocs/
    networks:
      - jenkins_nw

  jenkins:
    container_name: jenkins
    build:
      context: .
      dockerfile: Dockerfile-jenkins
    ports:
      - "10000:8080"
    environment:
      ACCESS_KEY: ${ACCESS_KEY}
      SECRET_KEY: ${SECRET_KEY}

    privileged: true

    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock   # 🔥 ESSENCIAL

    networks:
      - jenkins_nw

  es01:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.0
    container_name: es01
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - data01:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - jenkins_nw
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 20s
      retries: 5

  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.0
    container_name: kib01
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://es01:9200
    depends_on:
      es01:
        condition: service_healthy
    networks:
      - jenkins_nw

  fluentd:
    image: ericnaglertw/cd4ml-fluentd:1
    container_name: fluentd
    volumes:
      - ./fluentd/conf:/fluentd/etc
    ports:
      - "24224:24224"
    depends_on:
      es01:
        condition: service_healthy
    networks:
      - jenkins_nw
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "24224"]
      interval: 20s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio-storage:/data
    networks:
      - jenkins_nw
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 20s
      retries: 5

  create-bucket:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${ACCESS_KEY} ${SECRET_KEY};
      mc mb myminio/cd4ml-ml-flow-bucket || true;
      exit 0;
      "
    networks:
      - jenkins_nw

  mlflow:
    container_name: mlflow
    build:
      context: .
      dockerfile: Dockerfile-mlflow
    ports:
      - "12000:5000"
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${SECRET_KEY}
    volumes:
      - mlflow-storage:/mnt/mlflow
    depends_on:
      minio:
        condition: service_healthy
      create-bucket:
        condition: service_completed_successfully
    networks:
      - jenkins_nw

  model:
    container_name: model
    build:
      context: .
      dockerfile: Dockerfile-model
    ports:
      - "11000:5005"
    environment:
      MLFLOW_TRACKING_URL: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${SECRET_KEY}
    depends_on:
      fluentd:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - jenkins_nw

  dev:
    container_name: dev
    image: jupyter/minimal-notebook:latest
    ports:
      - "8888:8888"
    command: start.sh jupyter lab --LabApp.token=''
    volumes:
      - .:/home/jovyan/
    networks:
      - jenkins_nw

volumes:
  jenkins_home:
  data01:
  minio-storage:
  mlflow-storage:

networks:
  jenkins_nw:
    driver: bridge